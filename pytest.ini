[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: tests que requieren conexión a JPL Horizons (tardan varios minutos)
filterwarnings =
    ignore::FutureWarning
    ignore::UserWarning
    ignore::statsmodels.tools.sm_exceptions.InterpolationWarning